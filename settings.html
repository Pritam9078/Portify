<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portify Settings | Account & Preferences</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="js/utils.js"></script>
    <script>
        Utils.requireAuth();
        Utils.initTheme();
    </script>
    <style>
        .settings-card { padding: 2.5rem; max-width: 600px; margin-bottom: 2rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
        .form-control { width: 100%; padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid var(--border-color); background: #f9f9f9; font-size: 0.95rem; margin-bottom: 1.5rem; transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(100, 88, 245, 0.1); }
        .theme-toggle-btn { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); background: #fff; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .theme-toggle-btn:hover { background: #f4f3ee; border-color: var(--primary); }
        .btn-save { background: var(--primary); color: white; border: none; padding: 0.75rem 2rem; border-radius: 12px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .btn-save:hover { background: var(--primary-hover); transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="logo.png" alt="Portify" style="width: 32px; height: 32px; border-radius: 8px;">
                    Portify
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-label">Main Menu</div>
                <a href="dashboard.html" class="sidebar-link">
                    <iconify-icon icon="solar:home-smile-bold-duotone"></iconify-icon>
                    Dashboard
                </a>
                <a href="form.html" class="sidebar-link">
                    <iconify-icon icon="solar:pen-new-square-bold-duotone"></iconify-icon>
                    Portfolio Builder
                </a>
                <a href="form.html?section=projects" class="sidebar-link">
                    <iconify-icon icon="solar:folder-bold-duotone"></iconify-icon>
                    My Projects
                </a>
                <a href="form.html?section=templates" class="sidebar-link">
                    <iconify-icon icon="solar:gallery-bold-duotone"></iconify-icon>
                    Templates
                </a>
                
                <div class="sidebar-label">Insights</div>
                <a href="analytics.html" class="sidebar-link">
                    <iconify-icon icon="solar:chart-square-bold-duotone"></iconify-icon>
                    Analytics
                </a>
                
                <div class="sidebar-label">Account</div>
                <a href="settings.html" class="sidebar-link active">
                    <iconify-icon icon="solar:settings-bold-duotone"></iconify-icon>
                    Settings
                </a>
                <a href="#" class="sidebar-link" id="export-btn">
                    <iconify-icon icon="solar:download-bold-duotone"></iconify-icon>
                    Export Portfolio
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile-mini">
                    <div class="avatar" id="user-avatar" style="background-color: var(--primary); color: white;">PD</div>
                    <div class="user-info-mini">
                        <div class="user-name" id="user-display-name" style="font-weight: 700; font-size: 0.85rem;">User Name</div>
                        <div class="user-status" style="font-size: 0.75rem; color: #999;">Free Plan</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <header class="top-nav">
                <div class="nav-search">
                    <iconify-icon icon="solar:magnifer-linear" class="search-icon"></iconify-icon>
                    <input type="text" class="search-input" placeholder="Search settings...">
                </div>
                <div class="nav-actions">
                    <button class="icon-btn" id="logout-btn" title="Logout"><iconify-icon icon="solar:logout-linear"></iconify-icon></button>
                </div>
            </header>

            <main class="content-area">
                <div class="welcome-header">
                    <h1 class="welcome-title">Account Settings <iconify-icon icon="solar:settings-duotone-bold" style="color: var(--primary);"></iconify-icon></h1>
                    <p class="welcome-subtitle">Manage your profile and application preferences.</p>
                </div>

                <div class="card settings-card">
                    <h3 class="section-title mb-1-5">Profile Information</h3>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="set-name" class="form-control" placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="set-email" class="form-control" placeholder="Email Address" disabled>
                        <p class="text-xs text-muted mt-0-5">Email cannot be changed currently.</p>
                    </div>

                    <h3 class="section-title mb-1-5 mt-2">Preferences</h3>
                    <div class="form-group">
                        <label class="form-label">Interface Theme</label>
                        <button id="theme-toggle" class="theme-toggle-btn">
                            <iconify-icon icon="solar:moon-bold"></iconify-icon>
                            <span>Switch to Dark Mode</span>
                        </button>
                    </div>

                    <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                        <button class="btn-save" id="save-settings">Save Changes</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Utils.getCurrentUser();
            const nameInput = document.getElementById('set-name');
            const emailInput = document.getElementById('set-email');
            const themeBtn = document.getElementById('theme-toggle');
            
            if (user) {
                nameInput.value = user.name;
                emailInput.value = user.email;
                document.getElementById('user-display-name').textContent = user.name;
                const initials = user.name.substring(0, 2).toUpperCase();
                document.getElementById('user-avatar').textContent = initials;
            }

            // Theme Toggle Logic
            const currentTheme = localStorage.getItem('portify_theme') || 'light';
            updateThemeUI(currentTheme);

            themeBtn.addEventListener('click', () => {
                const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                Utils.setTheme(newTheme);
                updateThemeUI(newTheme);
            });

            function updateThemeUI(theme) {
                const icon = themeBtn.querySelector('iconify-icon');
                const label = themeBtn.querySelector('span');
                if (theme === 'dark') {
                    icon.setAttribute('icon', 'solar:sun-bold');
                    label.textContent = 'Switch to Light Mode';
                } else {
                    icon.setAttribute('icon', 'solar:moon-bold');
                    label.textContent = 'Switch to Dark Mode';
                }
            }

            // Save Settings
            document.getElementById('save-settings').addEventListener('click', () => {
                const newName = nameInput.value.trim();
                if (!newName) return alert('Name cannot be empty');

                // Update in LocalStorage
                const users = JSON.parse(localStorage.getItem('portify_users') || '[]');
                const userIdx = users.findIndex(u => u.email === user.email);
                if (userIdx !== -1) {
                    users[userIdx].name = newName;
                    localStorage.setItem('portify_users', JSON.stringify(users));
                    
                    // Update session
                    const session = JSON.parse(sessionStorage.getItem('portify_current_user'));
                    session.name = newName;
                    sessionStorage.setItem('portify_current_user', JSON.stringify(session));
                    
                    alert('Settings updated successfully!');
                    window.location.reload();
                }
            });

            document.getElementById('logout-btn')?.addEventListener('click', () => Utils.logout());
        });
    </script>
</body>
</html>
