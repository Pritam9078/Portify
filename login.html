<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Portify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card animate-up">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <img src="https://i.postimg.cc/zXncDddF/Screenshot_2026_02_18_at_10_04_18_PM_removebg_preview_(1).png" alt="Portify Logo">
                    <span>Portify</span>
                </a>
                <h1>Welcome Back</h1>
                <p>Log in to manage your professional presence.</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <iconify-icon icon="solar:letter-bold" class="input-icon"></iconify-icon>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <iconify-icon icon="solar:lock-password-bold" class="input-icon"></iconify-icon>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <iconify-icon icon="solar:eye-bold"></iconify-icon>
                        </button>
                    </div>
                </div>

                <div class="auth-error" id="auth-error" style="display: none;">
                    <iconify-icon icon="solar:danger-bold"></iconify-icon>
                    <span>Invalid email or password.</span>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg shine">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Get Started</a></p>
            </div>
        </div>
        
        <!-- Decorative Elements -->
        <div class="auth-orb auth-orb-1"></div>
        <div class="auth-orb auth-orb-2"></div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
