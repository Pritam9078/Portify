<div class="template-modern">
    <div class="glass-bg"></div>
    
    <div class="container">
        <!-- Hero -->
        <header class="modern-hero">
            <div class="badge">Open to new opportunities</div>
            <h1 id="hero-name">Alex Smith</h1>
            <p id="hero-title" class="gradient-text">Creator of digital experiences.</p>
            <div class="hero-actions">
                <a href="#projects" class="modern-btn">View Work</a>
                <div id="hero-social" class="modern-social"></div>
            </div>
        </header>

        <!-- Stats/Intro -->
        <section class="modern-about">
            <div class="glass-card">
                <p id="about-bio">Building the future, one pixel at a time...</p>
            </div>
        </section>

        <!-- Skills -->
        <section class="modern-skills">
            <div class="section-title">Expertise</div>
            <div id="skills-grid" class="modern-skills-grid"></div>
        </section>

        <!-- Projects -->
        <section id="projects" class="modern-projects">
            <div class="section-title">Selected Work</div>
            <div id="projects-grid" class="modern-projects-grid"></div>
        </section>

        <!-- Experience -->
        <section class="modern-experience">
            <div class="section-title">Journey</div>
            <div id="experience-list" class="modern-exp-list"></div>
        </section>
    </div>
</div>
