<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Preview | Portify</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@300;700;800&family=Syne:wght@400;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- 5 Dedicated Template Files -->
    <script src="js/templates/modern-horizon.js?v=1"></script>
    <script src="js/templates/code-pro.js?v=1"></script>
    <script src="js/templates/pure-minimal.js?v=1"></script>
    <script src="js/templates/artistic.js?v=1"></script>
    <script src="js/templates/studio-bold.js?v=1"></script>
    <script src="js/templates/aetherium.js?v=1"></script>
    <script src="js/templates-config.js?v=13"></script>
    <script src="js/portfolio-renderer.js?v=1"></script>
    
    <!-- PDF Export Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="js/export-manager.js?v=1"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: #f8fafc; }
        #preview-root { min-height: 100vh; }

        .preview-controls {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); backdrop-filter: blur(16px);
            padding: 0.75rem 1.75rem; border-radius: 99px;
            display: flex; gap: 1.5rem; align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
            z-index: 9999; font-family: 'Inter', sans-serif;
        }
        .preview-controls a, .preview-controls button {
            text-decoration: none; color: #111827; font-size: 0.875rem; font-weight: 600;
            display: flex; align-items: center; gap: 0.4rem;
            background: none; border: none; cursor: pointer;
            transition: opacity 0.2s; font-family: inherit; padding: 0;
        }
        .preview-controls a:hover, .preview-controls button:hover { opacity: 0.6; }
        .ctrl-divider { width: 1px; height: 18px; background: #e5e7eb; }

        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 80vh;
            text-align: center; font-family: 'Inter', sans-serif; color: #64748b; gap: 1rem;
        }
        .empty-state h2 { color: #1e293b; font-size: 1.5rem; }
        .empty-state p { font-size: 1rem; max-width: 360px; line-height: 1.6; }
        .empty-state a {
            display: inline-block; background: #6366f1; color: white;
            text-decoration: none; padding: 0.75rem 2rem; border-radius: 12px;
            font-weight: 600; font-size: 0.95rem; margin-top: 0.5rem;
        }
        @media print { .preview-controls { display: none !important; } }

        /* PDF Export Optimizations */
        #preview-root section, 
        #preview-root .card, 
        #preview-root .project-item,
        #preview-root .experience-item {
            page-break-inside: avoid;
            break-inside: avoid;
            -webkit-column-break-inside: avoid;
        }
    </style>
</head>
<body>

    <!-- Controls -->
    <div class="preview-controls">
        <a href="dashboard.html">
            <iconify-icon icon="solar:home-2-bold-duotone"></iconify-icon> Dashboard
        </a>
        <div class="ctrl-divider"></div>
        <a href="form.html">
            <iconify-icon icon="solar:pen-2-bold-duotone"></iconify-icon> Edit Portfolio
        </a>
        <div class="ctrl-divider"></div>
        <button id="btn-download-html">
            <iconify-icon icon="solar:html-bold-duotone" style="color: #e34c26;"></iconify-icon> Download HTML
        </button>
        <div class="ctrl-divider"></div>
        <button id="btn-download-pdf">
            <iconify-icon icon="solar:file-download-bold-duotone" style="color: #ff3e00;"></iconify-icon> Save as PDF
        </button>
    </div>

    <!-- Portfolio renders here -->
    <div id="preview-root"></div>

    <script>
    // ─── 1. DATA LOADING ─────────────────────────────────────────────────────────
    const STORAGE_KEY = 'portify_portfolio_data';

    function loadData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) return JSON.parse(raw);
        } catch(e) { console.error('[Preview] Failed to parse data:', e); }
        return null;
    }

    // ─── 3. MAIN RENDER ──────────────────────────────────────────────────────────
    function renderPreview() {
        const container = document.getElementById('preview-root');
        const data = loadData();

        console.log('[Portify Preview] Data:', data);
        console.log('[Portify Preview] Template:', data?.template);

        if (!data || !data.basicInfo?.name) {
            container.innerHTML = `
                <div class="empty-state">
                    <div style="font-size:4rem">📋</div>
                    <h2>No Portfolio Data Yet</h2>
                    <p>Fill in your details in the builder and click <strong>Generate Portfolio</strong> to see your preview here.</p>
                    <a href="form.html">Go to Builder →</a>
                </div>`;
            return;
        }

        const template = data.template || 'modern-horizon';
        
        if (window.renderPortfolio) {
            container.innerHTML = window.renderPortfolio(data, template);
        } else {
            container.innerHTML = '<div style="padding:2rem;color:#ef4444;">Renderer not found. Check console for details.</div>';
        }

        document.title = `${data.basicInfo.name} | Portfolio`;
        console.log('[Portify Preview] Render complete ✓');
    }

    // ─── 4. DOWNLOAD ─────────────────────────────────────────────────────────────
    function initExportActions() {
        const btnHtml = document.getElementById('btn-download-html');
        const btnPdf = document.getElementById('btn-download-pdf');

        if (btnHtml) {
            btnHtml.addEventListener('click', () => {
                const data = loadData();
                if (!data) return alert('No data found.');
                
                if (window.exportManager) {
                    window.exportManager.downloadStandaloneHTML(data);
                }
            });
        }

        if (btnPdf) {
            btnPdf.addEventListener('click', () => {
                const data = loadData();
                if (!data) return alert('No data found.');

                if (window.exportManager && window.exportManager.downloadPDF) {
                    window.exportManager.downloadPDF('preview-root', data.basicInfo?.name || 'portfolio');
                }
            });
        }
    }

    // ─── 5. BOOT ─────────────────────────────────────────────────────────────────
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            renderPreview();
            initExportActions();
        });
    } else {
        renderPreview();
        initExportActions();
    }
    </script>
</body>
</html>
